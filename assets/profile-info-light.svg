<svg width="680" height="220" viewBox="0 0 680 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Horace Chen profile intro</title>
  <desc id="desc">Hello, I'm Horace Chen. Mechanical Engineering, Embodied AI, Robotics.</desc>
  <style>
    .hello {
      font: 800 44px 'Segoe UI', Ubuntu, 'Helvetica Neue', Arial, sans-serif;
      fill: #0d1117;
      animation: fadeIn 0.6s ease-in-out forwards;
    }
    .lead {
      font: 800 48px Georgia, 'Times New Roman', serif;
      fill: #0d1117;
      animation: fadeIn 0.7s ease-in-out forwards;
    }
    .name {
      font: 800 64px 'Segoe UI', Ubuntu, 'Helvetica Neue', Arial, sans-serif;
      fill: #3547b8;
      animation: slideIn 0.8s ease-in-out forwards;
    }
    .pronunciation {
      font: 700 31px 'Segoe UI', Ubuntu, 'Helvetica Neue', Arial, sans-serif;
      fill: #7d8896;
      animation: fadeIn 1s ease-in-out forwards;
    }
    .subtitle {
      font: 400 26px 'Segoe UI', Ubuntu, 'Helvetica Neue', Arial, sans-serif;
      fill: #0d1117;
      animation: fadeIn 1.1s ease-in-out forwards;
    }
    .meta {
      font: 600 18px 'Cascadia Mono', 'SFMono-Regular', Consolas, monospace;
      fill: #7d8896;
      animation: fadeIn 1.2s ease-in-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
  <text class="hello" x="0" y="51">Hello</text>
  <text class="lead" x="0" y="125">I'm</text>
  <text class="name" x="88" y="125">Horace Chen</text>
  <text class="pronunciation" x="500" y="121">/ˈhɔːrəs/</text>
  <text class="subtitle" x="0" y="169">Mechanical Engineering / Embodied AI / Robotics</text>
  <text class="meta" x="0" y="210">HoraceCh.github.io   @HoraceCh   horacebuddle@gmail.com</text>
</svg>
